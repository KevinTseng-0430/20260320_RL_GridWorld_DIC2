<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Value Iteration Visualizer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>Value Iteration (價值迭代) Visualizer</h1>
            <p>5x5 Grid World | Start: (0,0) | End: (4,4)</p>
        </header>

        <main>
            <div class="controls progressive-flow">
                <div class="step-card" id="step1-card">
                    <div class="step-header">
                        <span class="step-number">1</span>
                        <h4>初始化設定</h4>
                    </div>
                    <div class="step-content">
                        <button class="btn btn-primary" id="btn-init"><i class="fa-solid fa-dice"></i> 隨機政策</button>
                    </div>
                </div>

                <div class="flow-arrow"><i class="fa-solid fa-chevron-right"></i></div>

                <div class="step-card" id="step2-card">
                    <div class="step-header">
                        <span class="step-number">2</span>
                        <h4>價值迭代</h4>
                    </div>
                    <div class="step-content">
                        <button class="btn btn-secondary" id="btn-step"><i class="fa-solid fa-shoe-prints"></i>
                            單步</button>
                        <button class="btn btn-accent" id="btn-run"><i class="fa-solid fa-forward-step"></i>
                            自動收斂</button>
                    </div>
                </div>

                <div class="flow-arrow"><i class="fa-solid fa-chevron-right"></i></div>

                <div class="step-card" id="step3-card">
                    <div class="step-header">
                        <span class="step-number">3</span>
                        <h4>最佳結果</h4>
                    </div>
                    <div class="step-content">
                        <button class="btn btn-success" id="btn-path" disabled><i class="fa-solid fa-route"></i>
                            顯示路徑</button>
                    </div>
                </div>
            </div>

            <div class="global-actions">
                <div class="params">
                    <label title="Discount Factor (&gamma;)">&gamma;: <input type="number" id="input-gamma" value="0.9"
                            step="0.1" min="0" max="1"></label>
                    <label title="Step Reward">Reward: <input type="number" id="input-reward" value="-1"
                            step="0.1"></label>
                </div>
                <button class="btn btn-danger" id="btn-reset"><i class="fa-solid fa-rotate-right"></i> 重置整個網格</button>
            </div>

            <div class="grid-container">
                <div id="grid" class="grid-5x5">
                    <!-- Grid cells will be generated by JavaScript -->
                </div>
            </div>

            <div class="status-panel">
                <h3>狀態訊息</h3>
                <p id="status-text">請點擊「隨機政策」開始，然後進行迭代。</p>
                <div class="legend">
                    <div class="legend-item"><span class="box start"></span> 起點 (Start)</div>
                    <div class="legend-item"><span class="box end"></span> 終點 (End)</div>
                    <div class="legend-item"><span class="box blocked"></span> 障礙物 (Block)</div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
